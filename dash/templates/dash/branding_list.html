{% extends "dash/base.html" %}
{% block content %}
<h1>{{ page_title }}</h1>

<table class="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Preview</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for mt in menu_types %}
      <tr>
        <td>{{ mt.name }}</td>
        <td>
          <span style="
            display:inline-block;
            padding:4px 8px;
            background: {{ mt.primary_color }};
            color: {{ mt.text_color }};
            font-family: {{ mt.font_family }};
          ">
            Aa
          </span>
        </td>
        <td>
          <a href="{% url 'branding_update' mt.pk %}">Edit branding</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="3">No menu types yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
